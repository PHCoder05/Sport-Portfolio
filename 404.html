<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Capriole</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100%;
            background: linear-gradient(135deg, #69d1ff, #2a72c5);
            color: #fff;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .btn {
            background-color: #fff;
            color: #2a72c5;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn:hover {
            background-color: #2a72c5;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #gameArea {
            width: 100%;
            height: 60%;
            position: relative;
            overflow: hidden;
        }
        #ball {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        #score {
            font-size: 1.5rem;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            p { font-size: 1rem; }
            #gameArea { height: 50%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>404</h1>
            <p>Oops! Page not found. While you're here, try to catch the ball!</p>
        </div>
        <div id="gameArea">
            <div id="ball"></div>
        </div>
        <div>
            <div id="score">Score: 0</div>
            <a href="index.html" class="btn">Back to Home Base</a>
        </div>
    </div>
    <script>
        const ball = document.getElementById('ball');
        const gameArea = document.getElementById('gameArea');
        const scoreElement = document.getElementById('score');
        let score = 0;

        function moveBall() {
            const maxX = gameArea.clientWidth - ball.clientWidth;
            const maxY = gameArea.clientHeight - ball.clientHeight;
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;
            ball.style.left = `${newX}px`;
            ball.style.top = `${newY}px`;
        }

        ball.addEventListener('click', () => {
            score++;
            scoreElement.textContent = `Score: ${score}`;
            moveBall();
        });

        moveBall();
        setInterval(moveBall, 2000);
    </script>
</body>
</html>
