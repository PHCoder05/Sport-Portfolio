<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Capriole</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            height: 100%;
            background: linear-gradient(135deg, #69d1ff, #2a72c5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-size: 8rem;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: bounce 2s infinite;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #fff;
            color: #2a72c5;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn:hover {
            background-color: #2a72c5;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .sports-icon {
            font-size: 3rem;
            margin: 0 0.5rem;
            opacity: 0.7;
            animation: float 3s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }
        .sports-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            h1 { font-size: 6rem; }
            p { font-size: 1.2rem; }
            .sports-icon { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! Looks like you've wandered off the field.</p>
        <a href="index.html" class="btn">Back to Home Base</a>
    </div>
    <div class="sports-container" id="sportsContainer"></div>

    <script>
        const sportsIcons = ['⚽', '🏀', '🏈', '⚾', '🎾', '🏐', '🏉', '🥎', '🏏', '🏑', '🏓', '🏸'];
        const container = document.getElementById('sportsContainer');

        function createIcon() {
            const icon = document.createElement('div');
            icon.className = 'sports-icon';
            icon.style.position = 'absolute';
            icon.style.left = `${Math.random() * 100}%`;
            icon.style.top = `${Math.random() * 100}%`;
            icon.style.animationDelay = `${Math.random() * 2}s`;
            icon.textContent = sportsIcons[Math.floor(Math.random() * sportsIcons.length)];
            container.appendChild(icon);

            setTimeout(() => {
                icon.remove();
            }, 3000);
        }

        setInterval(createIcon, 300);
    </script>
</body>
</html>
