<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capriole Blog - Coming Soon</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .coming-soon-container {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 800px;
      width: 90%;
    }

    .coming-soon-container h1 {
      color: #0C8DE4;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .coming-soon-container p {
      color: #333;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .coming-soon-container .btn {
      background-color: #6AC5C9;
      color: white;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    .coming-soon-container .btn:hover {
      background-color: #4fb2b6;
    }

    .coming-soon-container .illustration {
      max-width: 100%;
      height: auto;
      margin-bottom: 30px;
    }

    @media (max-width: 767px) {
      .coming-soon-container {
        padding: 30px;
      }

      .coming-soon-container h1 {
        font-size: 28px;
      }

      .coming-soon-container p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="coming-soon-container">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" width="40%" alt="Sports Illustration" class="illustration">
    <h1>Capriole Blog - Coming Soon</h1>
    <p>Exciting sports news, tips, and insights are on the way! Stay tuned for updates on your favorite teams and athletes. Our blog will be your go-to source for everything sports-related!</p>
    <a href="index.html" class="btn btn-primary">Back to Home</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
