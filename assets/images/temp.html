<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Apps | Capriole</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">  

    <link rel="stylesheet" href="assets/styles/styles.css">
    <style>
        /* Custom cursor styles */
        html, body, * {
            cursor: none !important;
        }

        body {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        #custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #bde73c; /* Tennis ball color */
            border: 2px solid #ffffff;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }

        a:hover ~ #custom-cursor,
        button:hover ~ #custom-cursor,
        .menu-toggle:hover ~ #custom-cursor,
        .store-badges a:hover ~ #custom-cursor {
            transform: scale(1.5);
        }
    </style>
</head>
<body>

    <!-- Your existing content here -->

    <div id="custom-cursor"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script> 
    <script src="assets/scripts/script.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cursor = document.getElementById('custom-cursor');

            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });

            const hoverElements = document.querySelectorAll('a, button, .menu-toggle, .store-badges a');
            
            hoverElements.forEach(element => {
                element.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'scale(1.5)';
                });
                element.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'scale(1)';
                });
            });
        });
    </script>
</body>
</html>
